application:
  kafka:
    topic: ${KAFKA_TOPIC}

spring:
  application:
    name: writer-kotlin
  config:
    import: optional:file:.env[.properties]
  boot:
    admin:
      client:
        url: http://${SPRING_ADMIN_HOST}:5004
        # от server
        username: ${SPRING_ADMIN_USER}
        password: ${SPRING_ADMIN_PASSWORD}
        instance:
          prefer-ip: true
          management-base-url: http://${SERVICE_HOST}:${management.server.port}
  kafka:
    consumer:
      group-id: ${KAFKA_GROUP_ID}
      bootstrap-servers: ${KAFKA_HOST}:9092
      client-id: ${KAFKA_CLIENT_ID}
      auto-offset-reset: earliest
      properties:
        spring:
          json:
            trusted:
              packages: "*"
  data:
    web:
      pageable:
        default-page-size: 50
        max-page-size: 50
        one-indexed-parameters: true

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
      properties:
        hibernate:
          format_sql: true
      enable_lazy_load_no_trans: true
      event:
        merge:
          entity_copy_observer: allow
    open-in-view: false # EXPLAIN_V Держать ли открытой транзакцию пока открыт HTTP запрос
    properties:
      hibernate:
        generate_statistics: true
        order_inserts: true
        order_updates: true
        jdbc:
          batch_size: 4
  docker:
    compose:
      enabled: false
      skip:
        in-test: false

server:
  port: 5003
  max-http-header-size: 100000

# Настройка Actuator
management:
  server:
    port: 5103
  endpoint:
    health:
      probes:
        enabled: true
      group:
        liveness:
          include: "livenessState,ping"
          show-components: always
          show-details: always
        readiness:
          include: "readinessState,ping,db"
          show-components: always
          show-details: always
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "*" # EXPLAIN_V Открыть у актуатора больше запросов для метрик
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true

logging:
  path: ${user.home}/logs/main
  level:
    org:
      hibernate:
        orm:
          jdbc:
            bind: TRACE

---

spring:
  config:
    import: optional:file:.env[.properties]
    activate:
      on-profile: "prod"
  jpa:
    show-sql: false
    properties:
      hibernate:
        generate_statistics: false

